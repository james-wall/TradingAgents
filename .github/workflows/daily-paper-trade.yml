name: Daily Paper Trade

on:
  schedule:
    # 8:00 AM ET (12:00 UTC) Mon–Fri — before NYSE open (9:30 AM ET)
    # Gives time for analysis to complete + review before placing trades
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Trade date YYYY-MM-DD (default: today)'
        required: false
        default: ''
      days_ahead:
        description: 'Earnings window in business days'
        required: false
        default: '3'
      max_days:
        description: 'Stop automatically after this many paper trading days'
        required: false
        default: '90'
      agents:
        description: 'Comma-separated agent names to run (default: all)'
        required: false
        default: ''
      extra_strategies:
        description: 'Run earnings-reversal, fomc-fade, max-pain-friday in addition to pre-earnings'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent two runs from writing to the DB simultaneously
concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  # ── Gate job: skip weekends and holidays without spinning up the full runner ─
  check-market:
    runs-on: ubuntu-latest
    outputs:
      is_trading_day: ${{ steps.market.outputs.is_trading_day }}
      trade_date: ${{ steps.date.outputs.trade_date }}
    steps:
      - name: Set trade date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "trade_date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "trade_date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Check market day
        id: market
        run: |
          python3 - <<'EOF' >> $GITHUB_OUTPUT
          import sys, datetime

          date_str = "${{ steps.date.outputs.trade_date }}"
          d = datetime.date.fromisoformat(date_str)

          # Skip weekends
          if d.weekday() >= 5:
              print("is_trading_day=false")
              sys.exit(0)

          # NYSE holidays through 2026
          holidays = {
              datetime.date(2025, 1, 1), datetime.date(2025, 1, 20),
              datetime.date(2025, 2, 17), datetime.date(2025, 4, 18),
              datetime.date(2025, 5, 26), datetime.date(2025, 6, 19),
              datetime.date(2025, 7, 4), datetime.date(2025, 9, 1),
              datetime.date(2025, 11, 27), datetime.date(2025, 12, 25),
              datetime.date(2026, 1, 1), datetime.date(2026, 1, 19),
              datetime.date(2026, 2, 16), datetime.date(2026, 4, 3),
              datetime.date(2026, 5, 25), datetime.date(2026, 6, 19),
              datetime.date(2026, 7, 3), datetime.date(2026, 9, 7),
              datetime.date(2026, 11, 26), datetime.date(2026, 12, 25),
          }
          print(f"is_trading_day={'true' if d not in holidays else 'false'}")
          EOF

      - name: Log result
        run: |
          if [ "${{ steps.market.outputs.is_trading_day }}" = "false" ]; then
            echo "⏭ ${{ steps.date.outputs.trade_date }} is not a trading day. Skipping." >> $GITHUB_STEP_SUMMARY
          fi

  # ── Main job: only runs on trading days ──────────────────────────────────────
  paper-trade:
    needs: check-market
    if: needs.check-market.outputs.is_trading_day == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Configure API keys
        run: |
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env

      # ── Check max-days cap ─────────────────────────────────────────────────
      - name: Check max days cap
        id: cap
        run: |
          MAX_DAYS="${{ github.event.inputs.max_days || '90' }}"
          python3 - <<EOF >> $GITHUB_OUTPUT
          import sqlite3, pathlib
          db = pathlib.Path("paper_trading.db")
          if not db.exists():
              print("reached_cap=false")
          else:
              conn = sqlite3.connect(db)
              row = conn.execute(
                  "SELECT COUNT(DISTINCT date) FROM daily_snapshots"
              ).fetchone()
              days = row[0] if row else 0
              conn.close()
              reached = days >= int("$MAX_DAYS")
              print(f"reached_cap={'true' if reached else 'false'}")
              print(f"days_completed={days}")
          EOF

      - name: Skip — max days reached
        if: steps.cap.outputs.reached_cap == 'true'
        run: |
          echo "🏁 Max days (${{ github.event.inputs.max_days || '90' }}) reached after ${{ steps.cap.outputs.days_completed }} trading days." >> $GITHUB_STEP_SUMMARY
          exit 1

      # ── Init DB ────────────────────────────────────────────────────────────
      - name: Init paper trading
        run: tradingagents init-paper-trading

      # ── Build watchlists ───────────────────────────────────────────────────
      - name: Build watchlists
        run: |
          DAYS="${{ github.event.inputs.days_ahead || '3' }}"
          DATE="${{ needs.check-market.outputs.trade_date }}"

          echo "=== Pre-earnings watchlist ==="
          tradingagents build-watchlist --strategy pre-earnings --source tickers.txt --days "$DAYS" --output watchlist-pre-earnings.txt || true

          echo "=== Earnings reversal watchlist ==="
          tradingagents build-watchlist --strategy earnings-reversal --source tickers.txt --trade-date "$DATE" --output watchlist-earnings-reversal.txt || true

          echo "=== FOMC fade watchlist ==="
          tradingagents build-watchlist --strategy fomc-fade --trade-date "$DATE" --output watchlist-fomc.txt || true

          echo "=== Max pain Friday watchlist ==="
          tradingagents build-watchlist --strategy max-pain-friday --source tickers.txt --trade-date "$DATE" --output watchlist-max-pain.txt || true

      # ── Run paper trades ───────────────────────────────────────────────────
      # Each strategy gets its own step so we can commit incrementally.
      # If a later strategy times out, earlier ones are already committed.
      - name: Run pre-earnings strategy
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          DATE="${{ needs.check-market.outputs.trade_date }}"
          AGENTS="${{ github.event.inputs.agents }}"
          DEFAULT_AGENTS="hybrid-flash-sonnet,hybrid-flash-sonnet-earnings,hybrid-flash-deepseek,hybrid-flash-deepseek-earnings,claude-earnings-specialist,gemini-earnings-specialist,benchmark-spy-hold,benchmark-watchlist-basket"
          AGENTS="${AGENTS:-$DEFAULT_AGENTS}"

          if [ -f watchlist-pre-earnings.txt ]; then
            echo "=== Running pre-earnings strategy ==="
            tradingagents paper-trade \
              --file watchlist-pre-earnings.txt \
              --date "$DATE" \
              --strategy pre-earnings \
              --agents "$AGENTS" || true
          fi

      - name: Commit pre-earnings results
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add paper_trading.db 2>/dev/null || true
          git add watchlist*.txt 2>/dev/null || true
          git diff --staged --quiet && exit 0
          git commit -m "chore: paper trade pre-earnings ${{ needs.check-market.outputs.trade_date }} [skip ci]"
          git pull --rebase
          git push

      # Other strategies are opt-in via workflow_dispatch input "extra_strategies"
      # to keep scheduled runs fast. Set to "true" to enable all strategies.
      - name: Run extra strategies (earnings-reversal, fomc-fade, max-pain-friday)
        if: github.event.inputs.extra_strategies == 'true'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          DATE="${{ needs.check-market.outputs.trade_date }}"
          AGENTS="${{ github.event.inputs.agents }}"
          DEFAULT_AGENTS="hybrid-flash-sonnet,hybrid-flash-sonnet-earnings,hybrid-flash-deepseek,hybrid-flash-deepseek-earnings,claude-earnings-specialist,gemini-earnings-specialist,benchmark-spy-hold,benchmark-watchlist-basket"
          AGENTS="${AGENTS:-$DEFAULT_AGENTS}"

          if [ -f watchlist-earnings-reversal.txt ]; then
            echo "=== Running earnings-reversal strategy ==="
            tradingagents paper-trade \
              --file watchlist-earnings-reversal.txt \
              --date "$DATE" \
              --strategy earnings-reversal \
              --agents "$AGENTS" || true
          fi

          if [ -f watchlist-fomc.txt ]; then
            echo "=== Running fomc-fade strategy ==="
            tradingagents paper-trade \
              --file watchlist-fomc.txt \
              --date "$DATE" \
              --strategy fomc-fade \
              --agents "$AGENTS" || true
          fi

          if [ -f watchlist-max-pain.txt ]; then
            echo "=== Running max-pain-friday strategy ==="
            tradingagents paper-trade \
              --file watchlist-max-pain.txt \
              --date "$DATE" \
              --strategy max-pain-friday \
              --agents "$AGENTS" || true
          fi

      # ── Job summary ────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          TRADE_DATE: ${{ needs.check-market.outputs.trade_date }}
        run: |
          python3 - <<'PYEOF' >> $GITHUB_STEP_SUMMARY
          import os, sqlite3, pathlib, datetime

          date = os.environ["TRADE_DATE"]
          db = pathlib.Path("paper_trading.db")
          if not db.exists():
              print("No database found.")
              raise SystemExit(0)

          conn = sqlite3.connect(db)

          # Today's trades
          trades = conn.execute(
              "SELECT agent_name, ticker, action, shares, price, total_value "
              "FROM trades WHERE date = ? ORDER BY agent_name, ticker", (date,)
          ).fetchall()

          # Leaderboard (latest snapshot per agent)
          leaderboard = conn.execute("""
              SELECT s.agent_name, s.portfolio_value, s.cash, s.positions_value,
                     s.daily_return_pct, s.cumulative_return_pct, s.date
              FROM daily_snapshots s
              INNER JOIN (
                  SELECT agent_name, MAX(date) as max_date
                  FROM daily_snapshots GROUP BY agent_name
              ) latest ON s.agent_name = latest.agent_name AND s.date = latest.max_date
              ORDER BY s.portfolio_value DESC
          """).fetchall()

          conn.close()

          print(f"# Paper Trade Report — {date}\n")

          # Trades section
          if trades:
              print("## Today's Trades\n")
              print("| Agent | Ticker | Action | Shares | Price | Total |")
              print("|-------|--------|--------|-------:|------:|------:|")
              for agent, ticker, action, shares, price, total in trades:
                  shares_str = f"{shares}" if shares else "—"
                  price_str = f"${price:,.2f}" if price else "—"
                  total_str = f"${total:,.2f}" if total else "—"
                  print(f"| {agent} | {ticker} | {action} | {shares_str} | {price_str} | {total_str} |")
              print()
          else:
              print("## Today's Trades\n")
              print("No trades executed today (all agents held or no watchlist matches).\n")

          # Leaderboard section
          if leaderboard:
              print("## Leaderboard\n")
              print("| # | Agent | Portfolio | Cash | Positions | Day | Total | Last Update |")
              print("|--:|-------|----------:|-----:|----------:|----:|------:|-------------|")
              for i, (agent, port, cash, pos, day_ret, tot_ret, dt) in enumerate(leaderboard, 1):
                  day_str = f"{day_ret:+.2f}%" if day_ret is not None else "—"
                  tot_str = f"{tot_ret:+.2f}%" if tot_ret is not None else "—"
                  print(f"| {i} | {agent} | ${port:,.0f} | ${cash:,.0f} | ${pos:,.0f} | {day_str} | {tot_str} | {dt} |")
          PYEOF

      # ── Show leaderboard in logs too ───────────────────────────────────────
      - name: Show leaderboard
        if: always()
        run: tradingagents leaderboard || true

      # ── Final commit (catches anything from extra strategies) ──────────────
      - name: Commit results
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add paper_trading.db
          git add watchlist*.txt 2>/dev/null || true
          # Only commit if something changed
          git diff --staged --quiet && exit 0
          git commit -m "chore: paper trade ${{ needs.check-market.outputs.trade_date }} [skip ci]"
          # Pull any changes pushed while we were running, then push
          git pull --rebase
          git push
